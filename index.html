<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YALL KNOW</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>YALL KNOW</h1>
<h3>Desloc Piccalo vs Haters - Miami</h3>
<div id="hud"><span>❤️100</span><span>⏱️30</span><span>🥊 Round 1/3</span></div>
<canvas id="game" width="1100" height="650"></canvas>
<div class="controls">
<button onclick="left()">⬅️</button>
<button onclick="right()">➡️</button>
<button onclick="jump()">⬆️</button>
<button onclick="crouch()">⬇️</button>
<button onclick="attack('PUNCH')">👊</button>
<button onclick="attack('KICK')">🦵</button>
<button onclick="attack('SLAM')">💥</button>
</div>
<button onclick="location.reload()">🔄 Restart</button>
<script src="script.js"></script>
</body>
</html>
